name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-lint:
    name: HTML Lint (HTMLHint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install HTMLHint
        run: npm install --no-save htmlhint@^1

      - name: Run HTMLHint
        run: npx htmlhint "**/*.html" --ignore "node_modules/**"

  css-lint:
    name: CSS Lint (Stylelint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Stylelint
        run: |
          npm install --no-save \
            stylelint@^16 \
            stylelint-config-standard@^36

      - name: Run Stylelint
        run: npx stylelint "**/*.css" --ignore-path .gitignore

  format-check:
    name: Format Check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install --no-save prettier@^3

      - name: Check formatting
        run: npx prettier --check "**/*.{html,css,md,json,yml,yaml}"
