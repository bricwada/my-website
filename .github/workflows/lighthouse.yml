name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Audit with Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install --no-save \
            @lhci/cli@^0.14 \
            http-server@^14

      - name: Start static server
        run: |
          npx http-server . -p 8080 --silent &
          npx wait-on http://localhost:8080 --timeout 30000

      - name: Run Lighthouse CI
        run: |
          npx lhci autorun \
            --collect.url=http://localhost:8080/index.html \
            --collect.url=http://localhost:8080/builds.html \
            --collect.url=http://localhost:8080/regulation.html \
            --collect.url=http://localhost:8080/tournament.html \
            --collect.url=http://localhost:8080/beginner.html \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn
        continue-on-error: true
