name: 機能リクエスト / 改善提案
description: 新機能やUX改善のアイデアを提案する
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな機能・改善が欲しいですか？
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景 / モチベーション
      description: なぜこれが必要だと思いますか？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 具体的な案
      description: UI / 動作 / ページ構成などのアイデアがあれば
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる方法があれば
    validations:
      required: false
