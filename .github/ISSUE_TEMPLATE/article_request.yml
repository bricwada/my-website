name: 記事リクエスト
description: 取り上げてほしい構築・大会・テーマを提案する
title: "[Article]: "
labels: ["content"]
body:
  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - 構築紹介
        - レギュレーション解説
        - 大会レポート
        - 初心者向けガイド
        - その他
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: 記事タイトル案
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 取り上げてほしい内容
      description: 構築の場合は使用者・大会名・順位など分かれば
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: 参考リンク
      description: 元動画・ツイートなどあれば
